version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: move_insights_db
    environment:
      POSTGRES_DB: move_insights
      POSTGRES_USER: movedev
      POSTGRES_PASSWORD: movesecret123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movedev -d move_insights"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: move_insights_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
