<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - MOVE Insights</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .auth-container {
      width: 100%;
      max-width: 400px;
    }

    .auth-card {
      background: rgba(15, 20, 40, 0.95);
      border: 1px solid #1a1f3a;
      border-radius: 12px;
      padding: 40px;
      backdrop-filter: blur(10px);
    }

    .logo {
      text-align: center;
      font-size: 32px;
      font-weight: bold;
      color: #00d4ff;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      margin-bottom: 8px;
      color: #ccc;
      text-transform: uppercase;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      background: #0a0e27;
      border: 1px solid #262d4f;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 14px;
      transition: all 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #00d4ff;
      box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s;
      margin-top: 10px;
    }

    .btn-primary {
      background: #00d4ff;
      color: #0a0e27;
    }

    .btn-primary:hover {
      background: #00a3d4;
      transform: translateY(-2px);
    }

    .toggle-link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #888;
    }

    .toggle-link a {
      color: #00d4ff;
      text-decoration: none;
      cursor: pointer;
    }

    .toggle-link a:hover {
      text-decoration: underline;
    }

    .error {
      background: rgba(255, 68, 68, 0.1);
      border: 1px solid #ff4444;
      color: #ff8888;
      padding: 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    @media (max-width: 480px) {
      .auth-card {
        padding: 25px;
      }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="logo">MOVE Insights</div>

      <div id="errorBox" class="error"></div>

      <!-- LOGIN -->
      <div id="loginForm">
        <form onsubmit="fazerLogin(event)">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" required>
          </div>
          <div class="form-group">
            <label>Senha</label>
            <input type="password" id="loginSenha" required>
          </div>
          <button type="submit" class="btn btn-primary">Entrar</button>
          <div class="toggle-link">
            Sem conta? <a onclick="mostrarRegistro()">Criar uma</a>
          </div>
        </form>
      </div>

      <!-- REGISTRO -->
      <div id="registroForm" style="display: none;">
        <form onsubmit="fazerRegistro(event)">
          <div class="form-group">
            <label>Nome da Agência</label>
            <input type="text" id="registroAgencia" placeholder="Move Business Solution" required>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="registroEmail" required>
          </div>
          <div class="form-group">
            <label>Senha</label>
            <input type="password" id="registroSenha" required minlength="6">
          </div>
          <div class="form-group">
            <label>Confirmar Senha</label>
            <input type="password" id="registroSenhaConfirma" required minlength="6">
          </div>
          <button type="submit" class="btn btn-primary">Criar Conta</button>
          <div class="toggle-link">
            Já tem conta? <a onclick="mostrarLogin()">Faça login</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    function mostrarLogin() {
      document.getElementById("loginForm").style.display = "block";
      document.getElementById("registroForm").style.display = "none";
      document.getElementById("errorBox").style.display = "none";
    }

    function mostrarRegistro() {
      document.getElementById("loginForm").style.display = "none";
      document.getElementById("registroForm").style.display = "block";
      document.getElementById("errorBox").style.display = "none";
    }

    async function fazerLogin(e) {
      e.preventDefault();
      const res = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email: document.getElementById("loginEmail").value,
          senha: document.getElementById("loginSenha").value
        })
      });

      const dados = await res.json();
      if (res.ok) {
        localStorage.setItem("token", dados.token);
        window.location.href = "/";
      } else {
        mostrarErro(dados.erro);
      }
    }

    async function fazerRegistro(e) {
      e.preventDefault();
      const senha = document.getElementById("registroSenha").value;
      const confirma = document.getElementById("registroSenhaConfirma").value;

      if (senha !== confirma) {
        mostrarErro("Senhas não conferem");
        return;
      }

      const res = await fetch("/api/auth/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          agenciaNome: document.getElementById("registroAgencia").value,
          email: document.getElementById("registroEmail").value,
          senha: senha
        })
      });

      const dados = await res.json();
      if (res.ok) {
        localStorage.setItem("token", dados.token);
        window.location.href = "/";
      } else {
        mostrarErro(dados.erro);
      }
    }

    function mostrarErro(msg) {
      const box = document.getElementById("errorBox");
      box.textContent = msg;
      box.style.display = "block";
    }

    // Se já tem token, redireciona
    if (localStorage.getItem("token")) {
      window.location.href = "/";
    }
  </script>
</body>
</html>
